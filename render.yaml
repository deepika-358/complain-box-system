services:
  - type: web
    name: complain-box-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    plan: free
    envVars:
      - key: JWT_SECRET_KEY
        value: complainbox-super-secret-key-2024
      - key: PYTHON_VERSION
        value: 3.11.0
